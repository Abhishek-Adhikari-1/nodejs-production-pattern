version: "3.9"

services:
  api:
    build: .
    container_name: node-api
    env_file:
      - .env.production
    depends_on:
      - redis
    expose:
      - "8080"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: redis-server
    env_file:
      - .env.production
    command: redis-server --requirepass ${REDIS_PASSWORD}
    restart: unless-stopped
    expose:
      - "6379"
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge